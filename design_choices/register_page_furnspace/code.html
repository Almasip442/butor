<!DOCTYPE html>

<html class="light" lang="hu"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FurnSpace - Fiók létrehozása</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@300;400;500;600&amp;family=Public+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3d2b1f", // Chocolate Brown
                        "accent": "#b87333", // Copper
                        "background-light": "#f5f5f5", // White Smoke
                        "background-dark": "#1a130f",
                        "charcoal": "#333333",
                    },
                    fontFamily: {
                        "display": ["Playfair Display", "serif"],
                        "sans": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-charcoal dark:text-slate-100 min-h-screen">
<main class="flex min-h-screen flex-col lg:flex-row">
<!-- Left Side: Registration Form Area -->
<section class="flex flex-1 flex-col justify-center px-8 py-12 md:px-16 lg:px-24 xl:px-32 bg-background-light dark:bg-background-dark">
<header class="mb-12">
<div class="flex items-center gap-2 mb-8">
<span class="material-symbols-outlined text-primary text-3xl">chair</span>
<h2 class="text-xl font-bold tracking-tight text-primary uppercase">FurnSpace</h2>
</div>
<h1 class="text-4xl md:text-5xl font-bold text-charcoal dark:text-white mb-4">Hozzon létre fiókot</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg">Csatlakozzon a prémium bútorok és az organikus elegancia világához.</p>
</header>
<form class="space-y-6 max-w-md">
<div class="space-y-2">
<label class="text-sm font-semibold uppercase tracking-wider text-charcoal/70 dark:text-slate-300" for="full-name">Teljes név</label>
<input class="w-full border-0 border-b-2 border-slate-300 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 p-4 focus:ring-0 focus:border-accent transition-colors placeholder:text-slate-400 rounded-t-lg" id="full-name" name="full-name" placeholder="Minta János" type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold uppercase tracking-wider text-charcoal/70 dark:text-slate-300" for="email">E-mail cím</label>
<input class="w-full border-0 border-b-2 border-slate-300 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 p-4 focus:ring-0 focus:border-accent transition-colors placeholder:text-slate-400 rounded-t-lg" id="email" name="email" placeholder="janos@pelda.hu" type="email"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold uppercase tracking-wider text-charcoal/70 dark:text-slate-300" for="password">Jelszó</label>
<input class="w-full border-0 border-b-2 border-slate-300 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 p-4 focus:ring-0 focus:border-accent transition-colors placeholder:text-slate-400 rounded-t-lg" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full py-5 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-4" type="submit">
                    Fiók létrehozása
                </button>
<div class="relative py-6">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-300 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-sm uppercase tracking-widest">
<span class="bg-background-light dark:bg-background-dark px-4 text-slate-500">vagy</span>
</div>
</div>
<button class="w-full flex items-center justify-center gap-3 py-4 border-2 border-primary text-primary hover:bg-primary/5 font-semibold rounded transition-all" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
<span>Bejelentkezés Google-lel</span>
</button>
</form>
<footer class="mt-12 text-slate-600 dark:text-slate-400">
<p>Már van fiókja? <a class="text-accent font-semibold hover:underline" href="#">Jelentkezzen be</a></p>
</footer>
</section>
<!-- Right Side: Lifestyle Image -->
<section class="hidden lg:block lg:w-5/12 xl:w-1/2 relative">
<div class="absolute inset-0 bg-primary/10 mix-blend-multiply z-10"></div>
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent z-20"></div>
<img alt="Modern luxury office with premium wood furniture" class="h-full w-full object-cover" data-alt="High-fidelity lifestyle image of a modern minimal office with chocolate brown wood furniture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDQq2eEMhTdcFgxfdLBaXw7UzqnpcG_Ujp4bYOaSv1-eW_CpWNjrQDDawsUvmme1moTwuQ-85SZNjfhrLwLh-6GtBgT3Lev5Xvy2SSY8Z018ZUWCnFkbL82t_4imgPoVr8ph4uAXjC6-tasmEV7Ie7CLv5AktTk7TsKcO6Erqy6KUK_Tz4m2xeqQxqgJBqN0Mo_TJY4EbjCJJhDDa-tX9DhbrUfzmJqO1AUTp9L5EHl62w_l83wlnnCPnugXtA5lcce62ojacvKVKk"/>
<div class="absolute bottom-12 left-12 right-12 z-30 text-white">
<div class="flex flex-col gap-2">
<p class="uppercase tracking-widest text-xs font-bold opacity-80">Kollekció 2024</p>
<h3 class="text-3xl font-bold leading-tight">Időtlen design minden térbe</h3>
<div class="h-1 w-20 bg-accent mt-4"></div>
</div>
</div>
</section>
</main>
</body></html>
